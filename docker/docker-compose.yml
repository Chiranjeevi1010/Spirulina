version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: spirulina-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spirulina
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: spirulina-server
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/spirulina
      JWT_SECRET: ${JWT_SECRET:-spirulina-jwt-secret-change-me}
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    container_name: spirulina-client
    ports:
      - '5173:80'
    depends_on:
      - server

volumes:
  pgdata:
